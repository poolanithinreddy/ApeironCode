name: ApeironCode PR review

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: poolanithinreddy/ApeironCode@main
        with:
          mode: pr-review
          dry_run: true
