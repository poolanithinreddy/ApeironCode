name: ApeironCode Action live smoke

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  dry-run-pr-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ApeironCode PR review in dry-run mode
        uses: ./
        with:
          mode: pr-review
          dry_run: true
